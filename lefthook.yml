# Lefthook — handoff-mcp pre-commit / pre-push hooks
#
# All cargo commands are routed through scripts/cargo-env.sh so the hooks work
# across heterogeneous dev environments (local macOS, a synced Mac, Docker).
# The script falls back to a writable $HOME/.cargo when CARGO_HOME points at a
# location the current user cannot write to (e.g. root-owned /usr/local/cargo
# in a container).

pre-commit:
  parallel: false
  commands:
    fmt-check:
      glob: "**/*.rs"
      run: . scripts/cargo-env.sh && cargo fmt --all -- --check
      fail_text: "rustfmt failed. Run 'cargo fmt --all' to fix."

    clippy:
      glob: "**/*.rs"
      run: . scripts/cargo-env.sh && cargo clippy --all-targets -- -D warnings
      fail_text: "clippy warnings found. Fix all warnings before committing."

    test:
      glob: "**/*.rs"
      run: . scripts/cargo-env.sh && cargo test
      fail_text: "Tests failed. All tests must pass before committing."

    no-main-commit:
      run: |
        BRANCH=$(git branch --show-current)
        if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
          echo "ERROR: Direct commits to $BRANCH are prohibited."
          echo "Create a feature branch first."
          exit 1
        fi
      fail_text: "Direct commits to main/master are prohibited."

    plugin-version-sync:
      glob: "{package.json,plugin/.claude-plugin/plugin.json,plugin-hooks/.claude-plugin/plugin.json,plugin-task-loop/.claude-plugin/plugin.json,.claude-plugin/marketplace.json}"
      run: ./scripts/sync-plugin-version.sh --check
      fail_text: "Plugin/marketplace manifest versions are out of sync with package.json. Run './scripts/sync-plugin-version.sh' to fix."

    workflow-inline-sync:
      glob: "plugin-task-loop/workflows/**/*.js"
      run: ./scripts/sync-workflow-inline.sh --check
      fail_text: "session-execute.js is out of sync with lib/verdict-logic.js. Run './scripts/sync-workflow-inline.sh' to regenerate."

    workflow-js-test:
      glob: "plugin-task-loop/workflows/**/*.js"
      run: node --test "plugin-task-loop/workflows/lib/*.test.js"
      fail_text: "Workflow verdict-logic tests failed."

pre-push:
  parallel: false
  commands:
    full-test:
      run: . scripts/cargo-env.sh && cargo test
      fail_text: "Tests failed."

    # Unconditional (no glob): pre-commit's globbed checks can be skipped by a
    # commit that touches no workflow file, so re-verify before the branch leaves.
    workflow-inline-sync:
      run: ./scripts/sync-workflow-inline.sh --check
      fail_text: "session-execute.js is out of sync with lib/verdict-logic.js. Run './scripts/sync-workflow-inline.sh'."

    workflow-js-test:
      run: node --test "plugin-task-loop/workflows/lib/*.test.js"
      fail_text: "Workflow verdict-logic tests failed."

    full-clippy:
      run: . scripts/cargo-env.sh && cargo clippy --all-targets -- -D warnings
      fail_text: "clippy warnings found."

    fmt-check:
      run: . scripts/cargo-env.sh && cargo fmt --all -- --check
      fail_text: "rustfmt failed."

    audit:
      run: . scripts/cargo-env.sh && cargo audit
      fail_text: "Known vulnerabilities found in dependencies."

    deny:
      run: . scripts/cargo-env.sh && cargo deny check
      fail_text: "License or supply-chain policy violation."

    secrets:
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --no-banner
        else
          echo "WARN: gitleaks not installed, skipping secret scan"
        fi
      fail_text: "Potential secrets detected. Remove before pushing."
